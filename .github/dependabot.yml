version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
    # Dependabot cannot verify build compatibility (it never builds or tests), so
    # there is no setting that guarantees "only compatible" updates. Two things
    # keep the noise down instead: (1) the ignore rules below pin out the versions
    # we already know break the deliberately-pinned toolchain, and (2) grouping
    # bundles every Gradle bump into a single PR, so the dependency lockfile only
    # needs regenerating once per cycle instead of once per dependency.
    groups:
      gradle-dependencies:
        patterns:
          - "*"
    ignore:
      # AGP 9 / Gradle 9 have no stable detekt release (only 2.0.0-alpha), and
      # CodeQL cannot extract Kotlin >= 2.3.30. Both are CI gates, so these
      # majors break the pipeline. Revisit when the tooling catches up.
      - dependency-name: "com.android.application"
        versions: [">=9"]
      - dependency-name: "com.android.tools.build:gradle"
        versions: [">=9"]
      # The Gradle wrapper itself: AGP 8.13.2 and detekt 1.23.8 do not run on
      # Gradle 9 yet. Dependabot names the wrapper update "gradle".
      - dependency-name: "gradle"
        versions: [">=9"]
      - dependency-name: "org.jetbrains.kotlin.android"
        versions: [">=2.3"]
      # Shares the single `kotlin` catalog version with kotlin.android, so it has
      # to be ignored too or Dependabot bumps `kotlin` through this plugin id.
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions: [">=2.3"]
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: [">=2.3"]
      # androidx.core 1.19.0+ requires compileSdk 37 / AGP 9.1; 1.18.x is the
      # highest that builds against the pinned compileSdk 36.
      - dependency-name: "androidx.core:core-ktx"
        versions: [">=1.19"]
      - dependency-name: "androidx.core:core"
        versions: [">=1.19"]
      # activity-compose 1.12.0+ pulls the 2026 train (lifecycle 2.9.x, compose
      # 1.9.x); 1.11.x is the highest that stays on the pinned lifecycle 2.8.7.
      - dependency-name: "androidx.activity:activity-compose"
        versions: [">=1.12"]
      # compose-bom 2025.08.00+ pulls compose 1.9.x (lifecycle 2.9.x, the 2026
      # train) and breaks the androidTest classpath; 2025.07.00 (compose 1.8.3)
      # is the highest that stays on the pinned lifecycle 2.8.7.
      - dependency-name: "androidx.compose:compose-bom"
        versions: [">=2025.08"]
      # lifecycle 2.9.0+ is the 2026 train: it breaks the androidTest classpath
      # (concurrent-futures 1.1.0 vs espresso's 1.2.0) the same way compose 1.9.x
      # does; 2.8.7 is the highest that stays on the pinned compileSdk-36 train.
      - dependency-name: "androidx.lifecycle:*"
        versions: [">=2.9"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
