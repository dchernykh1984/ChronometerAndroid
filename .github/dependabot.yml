version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      # AGP 9 / Gradle 9 have no stable detekt release (only 2.0.0-alpha), and
      # CodeQL cannot extract Kotlin >= 2.3.30. Both are CI gates, so these
      # majors break the pipeline. Revisit when the tooling catches up.
      - dependency-name: "com.android.application"
        versions: [">=9"]
      - dependency-name: "com.android.tools.build:gradle"
        versions: [">=9"]
      - dependency-name: "org.jetbrains.kotlin.android"
        versions: [">=2.3"]
      - dependency-name: "org.jetbrains.kotlin:*"
        versions: [">=2.3"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
