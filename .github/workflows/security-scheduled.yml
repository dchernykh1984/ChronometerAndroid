name: Security (scheduled)

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 6" # every Saturday at 09:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # Full dependency vulnerability scan on main and on the weekly schedule.
  osv-scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
