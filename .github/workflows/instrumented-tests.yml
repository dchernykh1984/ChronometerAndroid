name: Instrumented tests

# Runs the Compose UI tests on an emulator for both a phone and a tablet screen
# size. Heavier than the unit-test gate, so it is opt-in (manual + on PRs).
on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  connected:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Phone runs a modern API so the POST_NOTIFICATIONS (33+), all-files
          # access and foreground-service (34+) code paths are actually exercised.
          - name: phone
            profile: pixel_6
            api-level: 34
            target: google_apis
          # Tablet keeps a stable API for large-screen layout coverage.
          - name: tablet
            profile: pixel_c
            api-level: 30
            target: default
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: gradle/actions/setup-gradle@v6
      - name: ${{ matrix.name }} instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: x86_64
          profile: ${{ matrix.profile }}
          script: ./gradlew connectedDebugAndroidTest
      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: connected-report-${{ matrix.name }}
          path: app/build/reports/androidTests/connected/
          if-no-files-found: ignore
