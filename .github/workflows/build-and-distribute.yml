name: Build and Distribute

# Cut a release by pushing a tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.
# workflow_dispatch builds the signed APK without publishing (useful for testing
# the signing pipeline).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # required to create a Release and upload the APK asset
  id-token: write # required to sign the build provenance attestation
  attestations: write # required to record the attestation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify signing secrets are present
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=""
          for name in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing="$missing $name"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing signing secret(s):$missing. Set all four before releasing."
            exit 1
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"

      - name: Derive version name from tag
        id: version
        run: |
          REF="${GITHUB_REF_NAME}"
          echo "name=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # versionCode must increase monotonically; run_number is monotonic.
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: ./gradlew assembleRelease

      - name: Stage APK with a versioned name
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk \
            "dist/chronometer-${{ steps.version.outputs.name }}.apk"

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/chronometer-*.apk

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/chronometer-*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
