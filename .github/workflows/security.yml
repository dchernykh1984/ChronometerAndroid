name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 9 * * 6" # every Saturday at 09:00 UTC

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  # On pull requests: fail only on vulnerabilities the PR introduces.
  scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.8

  # On main and on the weekly schedule: full dependency vulnerability scan.
  scan:
    if: ${{ github.event_name != 'pull_request' }}
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.8
