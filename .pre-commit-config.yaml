repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
        exclude: '^gradle/wrapper/gradle-wrapper\.jar$'
      - id: trailing-whitespace
        exclude: '\.bat$'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.bat$'
