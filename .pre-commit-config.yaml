repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
        exclude: '^gradle/wrapper/gradle-wrapper\.jar$'
      - id: trailing-whitespace
        exclude: '\.bat$'
      - id: mixed-line-ending
        args: [--fix=lf]
        exclude: '\.bat$'

  # Kotlin linting and static analysis run through Gradle, so they require the
  # JDK + Android SDK. They are staged at pre-push (not every commit) to keep
  # local commits fast; CI also runs them as a dedicated Gradle job.
  - repo: local
    hooks:
      - id: ktlint
        name: ktlint
        entry: ./gradlew --quiet ktlintCheck
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
      - id: detekt
        name: detekt
        entry: ./gradlew --quiet detekt
        language: system
        pass_filenames: false
        types_or: [kotlin]
        stages: [pre-push]
